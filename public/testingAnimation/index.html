<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZoomingStars — JS vs Pure CSS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    .compare {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .panel {
      position: relative;
      flex: 1;
      height: 100%;
      background: #000;
      overflow: hidden;
      border-right: 1px solid #1a1a1a;
    }
    .panel:last-child { border-right: none; }

    .panel-label {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      font-size: 13px;
      letter-spacing: 0.04em;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .panel-label small {
      display: block;
      opacity: 0.6;
      font-size: 11px;
      margin-top: 2px;
    }

    /* ---- shared star element ---- */
    .star {
      position: absolute;
      transform-origin: center;
      color: #ffffff;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0);
    }
    .star svg { width: 100%; height: 100%; display: block; }

    /* ===== LEFT: old approach — animated filter on the scaling element + will-change ===== */
    .old .star {
      filter: drop-shadow(0 0 4px currentColor); /* heavy: re-rasterizes each frame on Safari */
      will-change: transform, opacity;           /* reserves a backing store per star */
    }

    /* ===== RIGHT: new approach — static glow on inner SVG, plain transform/opacity animation ===== */
    .new .star {
      animation-name: starLifecycle;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
    }
    .new .star svg { filter: drop-shadow(0 0 3px currentColor); }

    @keyframes starLifecycle {
      0%   { opacity: 0;   transform: translate(-50%, -50%) scale(0); }
      15%  { opacity: 0.3; transform: translate(-50%, -50%) scale(0.2); }
      30%  { opacity: 0.7; transform: translate(-50%, -50%) scale(0.5); }
      50%  { opacity: 1;   transform: translate(-50%, -50%) scale(1); }
      70%  { opacity: 1;   transform: translate(-50%, -50%) scale(1); }
      80%  { opacity: 0.8; transform: translate(-50%, -50%) scale(0.9); }
      90%  { opacity: 0.3; transform: translate(-50%, -50%) scale(0.3); }
      95%  { opacity: 0.1; transform: translate(-50%, -50%) scale(0.1); }
      100% { opacity: 0;   transform: translate(-50%, -50%) scale(0); }
    }
  </style>
</head>
<body>
  <div class="compare">
    <div class="panel old" id="oldPanel">
      <div class="panel-label">
        Old · JavaScript
        <small>random regen each cycle · animated filter · will-change</small>
      </div>
    </div>
    <div class="panel new" id="newPanel">
      <div class="panel-label">
        New · Pure CSS
        <small>static stars · infinite keyframe · glow on inner svg</small>
      </div>
    </div>
  </div>

  <script>
    const STAR_SVG =
      '<svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M52,26c-23.9,1.2-24.8,2.1-26,26c-1.2-23.9-2.1-24.8-26-26c23.9-1.2,24.8-2.1,26-26C27.2,23.9,28.1,24.8,52,26z" fill="currentColor"/>' +
      '</svg>';

    // ---- Fixed star field shared by both panels (so the comparison is fair) ----
    const STARS = [
      { x: 6,  y: 14, size: 22, delay: 0,   duration: 9 },
      { x: 17, y: 70, size: 16, delay: 2.4, duration: 11 },
      { x: 27, y: 33, size: 26, delay: 5.1, duration: 8 },
      { x: 38, y: 82, size: 14, delay: 1.2, duration: 12 },
      { x: 46, y: 21, size: 20, delay: 3.7, duration: 10 },
      { x: 55, y: 58, size: 24, delay: 6.3, duration: 9 },
      { x: 63, y: 9,  size: 15, delay: 0.8, duration: 13 },
      { x: 71, y: 44, size: 27, delay: 4.5, duration: 8 },
      { x: 79, y: 76, size: 18, delay: 2.0, duration: 11 },
      { x: 88, y: 28, size: 21, delay: 5.8, duration: 10 },
      { x: 93, y: 62, size: 16, delay: 1.6, duration: 12 },
      { x: 12, y: 47, size: 19, delay: 7.0, duration: 9 },
      { x: 33, y: 6,  size: 23, delay: 3.1, duration: 10 },
      { x: 50, y: 90, size: 17, delay: 6.8, duration: 8 },
      { x: 67, y: 86, size: 25, delay: 0.4, duration: 13 },
      { x: 84, y: 52, size: 14, delay: 4.0, duration: 11 },
      { x: 22, y: 90, size: 20, delay: 2.7, duration: 9 },
      { x: 58, y: 35, size: 18, delay: 5.4, duration: 12 },
      { x: 76, y: 18, size: 22, delay: 1.0, duration: 10 },
      { x: 3,  y: 84, size: 15, delay: 6.0, duration: 11 },
    ];

    function makeStarEl(s) {
      const el = document.createElement('div');
      el.className = 'star';
      el.style.left = s.x + '%';
      el.style.top = s.y + '%';
      el.style.width = s.size + 'px';
      el.style.height = s.size + 'px';
      el.innerHTML = STAR_SVG;
      return el;
    }

    // ===== RIGHT panel: pure CSS — just drop the elements in, CSS loops them =====
    const newPanel = document.getElementById('newPanel');
    STARS.forEach(s => {
      const el = makeStarEl(s);
      el.style.animationDelay = s.delay + 's';
      el.style.animationDuration = s.duration + 's';
      newPanel.appendChild(el);
    });

    // ===== LEFT panel: the old JS approach — drive each star with JS and
    // regenerate it (new random position/timing) every time its cycle ends =====
    const oldPanel = document.getElementById('oldPanel');

    function rand(min, max) { return min + Math.random() * (max - min); }

    function runOldStar(initial) {
      const el = makeStarEl(initial);
      oldPanel.appendChild(el);

      function cycle(s) {
        el.style.left = s.x + '%';
        el.style.top = s.y + '%';
        el.style.width = s.size + 'px';
        el.style.height = s.size + 'px';
        // restart the JS-driven WAAPI animation each cycle
        const total = s.duration * 1000;
        const anim = el.animate(
          [
            { opacity: 0,   transform: 'translate(-50%, -50%) scale(0)' },
            { opacity: 0.3, transform: 'translate(-50%, -50%) scale(0.2)', offset: 0.15 },
            { opacity: 0.7, transform: 'translate(-50%, -50%) scale(0.5)', offset: 0.30 },
            { opacity: 1,   transform: 'translate(-50%, -50%) scale(1)',   offset: 0.50 },
            { opacity: 1,   transform: 'translate(-50%, -50%) scale(1)',   offset: 0.70 },
            { opacity: 0.8, transform: 'translate(-50%, -50%) scale(0.9)', offset: 0.80 },
            { opacity: 0.3, transform: 'translate(-50%, -50%) scale(0.3)', offset: 0.90 },
            { opacity: 0,   transform: 'translate(-50%, -50%) scale(0)' },
          ],
          { duration: total, delay: s.delay * 1000, easing: 'ease-in-out', fill: 'forwards' }
        );
        anim.onfinish = () => {
          // regenerate with fresh randomness — the churn the old version did
          cycle({ x: rand(2, 96), y: rand(4, 92), size: rand(14, 28), delay: 0, duration: rand(8, 13) });
        };
      }
      cycle(initial);
    }

    STARS.forEach(s => runOldStar(Object.assign({}, s)));
  </script>
</body>
</html>
